name: deploy to coolify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-coolify
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: trigger coolify deploy
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_API_TOKEN:  ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_DEPLOY_URL:-}" ] || [ -z "${COOLIFY_API_TOKEN:-}" ]; then
            echo "::error::COOLIFY_DEPLOY_URL and COOLIFY_API_TOKEN secrets must be set"
            exit 1
          fi
          echo "triggering coolify for $GITHUB_SHA"
          curl -fsSL --retry 3 --retry-delay 5 \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -H "Accept: application/json" \
            "$COOLIFY_DEPLOY_URL"
          echo
          echo "✓ coolify deploy triggered"
